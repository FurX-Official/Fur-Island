# Cloudflare Pages Wrangler 配置文件

[pages]
build_output_dir = "docs/.vitepress/dist"
build_command = "npm run build"

name = "fur-island"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"

[env.production]
name = "fur-island"
route = "fur-island.asia/*"

[env.preview]
name = "fur-island-preview"
